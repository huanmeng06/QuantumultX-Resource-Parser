# --- 2. Region Group ---
🇭🇰 香港节点 = url-test,policy-select-name=🇭🇰 香港 04,interval=60,tolerance=50,timeout=5,url=http://www.gstatic.com/generate_204,policy-regex-filter=(?i)^(?!.*(家宽|宽频|宽带|住宅|hkbn|hgc|pccw|netvigator|cmhk|hkt|smartone|3hk|hutchison|下载)).*(🇭🇰|香港|hk|hong kong|深港|沪港|京港).*

🇨🇳 台湾节点 = url-test,policy-select-name=🇨🇳 台湾 02,interval=60,tolerance=50,url=http://www.gstatic.com/generate_204,policy-regex-filter=(?i)^(?!.*(家宽|宽频|宽带|住宅|hinet|中华电信|台灣大哥大|fareastone|远传|tfn|亚太|gt|seednet)).*(🇹🇼|🇨🇳|台湾|tw|taiwan|台北|新北|台中|高雄).*

🇯🇵 日本节点 = url-test,policy-select-name=🇯🇵 日本 02,interval=60,tolerance=50,url=http://www.gstatic.com/generate_204,policy-regex-filter=(?i)^(?!.*(家宽|宽频|宽带|住宅|softbank|docomo|ntt|kddi|au|iij|ocn|so-net|biglobe)).*(🇯🇵|日本|jp|japan|东京|大阪).*

🇸🇬 狮城节点 = url-test,policy-select-name=🇸🇬 新加坡 06,interval=300,tolerance=50,url=http://www.gstatic.com/generate_204,policy-regex-filter=(?i)^(?!.*(家宽|宽频|宽带|住宅|singtel|starhub|m1|myrepublic|viewqwest|whizcomms)).*(🇸🇬|新加坡|sg|singapore).*

🇺🇸 美国节点 = url-test,policy-select-name=🇺🇸 美国 05,interval=60,tolerance=50,url=http://www.gstatic.com/generate_204,policy-regex-filter=(?i)^(?!.*(家宽|宽频|宽带|isp|住宅|comcast|xfinity|att|at&t|verizon|spectrum|cox|centurylink|frontier|windstream)).*(\bUSA?\b|美国|🇺🇸|united states|america|洛杉矶|圣何塞|西雅图|达拉斯|纽约).*

🇲🇾 马来节点 = url-test, policy-regex-filter=.*(🇲🇾|马来西亚|大马|吉隆坡|Malaysia|MY).*, url=http://www.gstatic.com/generate_204, interval=60, tolerance=50

🇹🇷 土耳其节点 = url-test, policy-regex-filter=.*(🇹🇷|土耳其|Turkey|TR).*, url=http://www.gstatic.com/generate_204, interval=60, tolerance=50

⏬ 下载专用 = url-test,policy-select-name=🇭🇰 下载专用B [0.2X],interval=600,tolerance=100,timeout=5,url=http://www.gstatic.com/generate_204,policy-regex-filter=(?i)^(?=.*(下载|download|dl|大流量|低倍率|0\.[0-9]+x|0\.[0-9]+倍)).*

🏠🇭🇰 香港家宽 = url-test, policy-regex-filter=(?i)^(?=.*(家宽|宽频|宽带|住宅|hkbn|hgc|pccw|netvigator|cmhk|hkt|smartone|3hk|hutchison)).*(🇭🇰|香港|hk|hong kong|深港|沪港|京港).*, url=http://www.gstatic.com/generate_204, interval=300, tolerance=50

🏠🇨🇳 台湾家宽 = url-test, policy-regex-filter=(?i)^(?=.*(家宽|宽频|宽带|住宅|hinet|中华电信|台灣大哥大|fareastone|远传|tfn|亚太|gt|seednet)).*(🇹🇼|🇨🇳|台湾|tw|taiwan|台北|新北|台中|高雄).*, url=http://www.gstatic.com/generate_204, interval=300, tolerance=50

🏠🇯🇵 日本家宽 = url-test, policy-regex-filter=(?i)^(?=.*(家宽|宽频|宽带|住宅|softbank|docomo|ntt|kddi|au|iij|ocn|so-net|biglobe)).*(🇯🇵|日本|jp|japan|东京|大阪).*, url=http://www.gstatic.com/generate_204, interval=300, tolerance=50

